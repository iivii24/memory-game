<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Game</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <h1>Memory Game</h1>

    <!-- Nivel actual -->
    <div id="nivel-display">Nivel <span id="nivel-actual">1</span> / 5</div>

    <!-- Barra stats -->
    <div id="stats">
      <span>Movimientos: <span id="movimientos">0</span></span>
      <span>Tiempo: <span id="tiempo">0</span>s</span>
    </div>

    <button id="reiniciar">Reiniciar</button>

    <!-- Tablero -->
    <div id="tablero"></div>

    <!-- Record -->
    <div id="record-display">Cargando récord...</div>

    <!-- Modal entre niveles -->
    <div id="modal-nivel" style="display:none">
      <h2>¡Nivel superado! 🎉</h2>
      <p id="msg-nivel"></p>
      <button id="btn-siguiente-nivel">Siguiente nivel →</button>
    </div>

    <!-- Modal victoria final -->
    <div id="victoria" style="display:none">
      <h2>¡Has completado todos los niveles! 🏆</h2>
      <p>Tiempo total: <span id="tiempo-victoria">0</span>s</p>
      <p id="record-msg" style="display:none"></p>
      <input type="text" id="input-nombre" placeholder="Tu nombre..." style="display:none"/>
      <button id="btn-guardar">Guardar récord</button>
      <button id="reiniciar-victoria">Jugar de nuevo</button>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
